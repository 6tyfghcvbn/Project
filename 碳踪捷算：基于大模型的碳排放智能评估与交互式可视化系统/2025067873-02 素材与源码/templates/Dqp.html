            // 初始化图表
            function initChart() {
                const traces = [{
                    type: 'scatter3d',
                    mode: 'markers+text',
                    x: [],
                    y: [],
                    z: [],
                    text: [],
                    textfont: {  // 新增文字样式配置

                    hoverinfo: 'none',
                    customdata: []
                }];

                const layout = {
                    scene: {
                        xaxis: {visible: false},
                        yaxis: {visible: false},
                        zaxis: {visible: false},
                        bgcolor: 'rgba(0,0,0,0)'
                    },
                    margin: {l: 0, r: 0, t: 0, b: 0},
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    clickmode: 'event+select'
                };

                Plotly.newPlot('chart-container', traces, layout);

                // 添加点击事件监听
                document.getElementById('chart-container').on('plotly_click', function(data) {
                    const point = data.points[0];
                    document.getElementById('info-panel').innerHTML = 
                        `${point.text} | ${handlePointCustomData(point)} kgCO₂`; 
                });
            }

            // 更新气泡数据
            function updateBubbles() {
                const sampled = dataset
                    .sort(() => 0.5 - Math.random())
                    .slice(0, 30);

                const update = {
                    x: [sampled.map(d => d.x)],
                    y: [sampled.map(d => d.y)],
                    z: [sampled.map(d => d.z)],
                    text: [sampled.map(d => d.product)],
                    textfont: { size: 16, family: 'Microsoft YaHei UI', color: '#000000' }, 
                    'marker.size': [sampled.map(d => d.size)],
                    'marker.color': [sampled.map(d => d.color)],
                    customdata: [sampled.map(d => [d.emission])]
                };

                Plotly.update('chart-container', update);
            }

            // 动画控制
            function toggleAnimation() {
                isAnimating = !isAnimating;
                const icon = document.getElementById('animation-icon');
                const text = document.getElementById('animation-text');

                if(isAnimating) {
                    icon.className = 'fas fa-pause mr-2';
                    text.textContent = '暂停动画';
                    intervalId = setInterval(updateBubbles, 3000);
                } else {
                    icon.className = 'fas fa-play mr-2';
                    text.textContent = '开始动画';
                    clearInterval(intervalId);
                }
            }

            // 初始化
            document.addEventListener('DOMContentLoaded', function() {
                initChart();
                intervalId = setInterval(updateBubbles, 3000);
            });
